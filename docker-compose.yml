services:
  claude:
    build: .
    image: claude-code
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    environment:
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS:-}
    volumes:
      - claude-config:/home/node/.claude
      - .:/workspace

volumes:
  claude-config:
